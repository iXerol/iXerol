name: Update README stats

on:
  push:
    branches:
      - master
    paths:
      - README.md
      - .github/workflows/update-readme-stats.yml
  schedule:
    - cron: "5 14 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&theme=github_dark
          path: profile/stats.svg
          token: ${{ secrets.README_STATS_TOKEN }}

      - name: Commit stats card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg
          git diff --cached --quiet || git commit -m "Update README stats card"
          git push
